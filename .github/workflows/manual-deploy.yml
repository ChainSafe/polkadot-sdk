# Note: Workflows must be in the default branch to appear in Actions tab
# To make it visible in other branches, we need to add path filters
name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and deploy'
        required: true
        default: 'master'
      target_server:
        description: 'Target server for deployment'
        required: true
        type: string
  # Add path trigger to make workflow visible in non-default branches
  push:
    # paths:
    #   - '.github/workflows/manual-deploy.yml'
    branches:
      - 'hamid-test-code'

jobs:
  test-checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: List directory contents
        run: |
          echo "Current branch: ${{ inputs.branch }}"
          echo "Listing repository contents:"
          ls -la
          
      - name: Show git info
        run: |
          git branch
          git status

      - name: Check remote server
        env:
          TARGET_SERVER: devops@${{ inputs.target_server }}
        run: |
          # Setup SSH key
          eval $(ssh-agent -s)
          echo "${{ secrets.CICD_SSH_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -

          # Connect and run docker ps
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              $TARGET_SERVER << 'EOF'
            echo "Checking Docker containers..."
            docker ps
            echo "Done checking containers"
          EOF

